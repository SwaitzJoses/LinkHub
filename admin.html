<!DOCTYPE html>
<html>
<head>
  <title>Create Business</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">
  <h1>🚀 LinkHub Admin</h1>

  <input id="name" placeholder="Business Name">
  <input id="slug" placeholder="Slug">
  <input id="phone" placeholder="Phone Number">
  <input id="description" placeholder="Description">
  <input type="file" id="logo" accept="image/*">
  <img
  id="logoPreview"
  style="
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:20px;
    display:none;
    margin-top:15px;
  "
>
  <input id="maps" placeholder="Google Maps Link">
  <input id="instagram" placeholder="Instagram Link">
  <input id="gallery" placeholder="Gallery URLs">
 <select id="theme">
  <option value="#6a84d2">💙 Royal Blue</option>
  <option value="#7c3aed">💜 Purple</option>
  <option value="#2563eb">🔵 Ocean Blue</option>
  <option value="#db2777">🌸 Pink</option>
  <option value="#dc2626">❤️ Red</option>
  <option value="#ea580c">🧡 Orange</option>
  <option value="#059669">💚 Emerald</option>
  <option value="#0f766e">🩵 Teal</option>
  <option value="#1f2937">⚫ Dark Gray</option>
  <option value="#000000">🖤 Black</option>
</select>
  <div class="form-group">
  
  <input
    type="text"
    id="whatsapp"
    placeholder="919876543210"
  >
</div>

 <button id="save">Create Business</button>

<div class="actions">
  <button id="copy">📋 Copy Link</button>
  <button id="open">🌐 Open Website</button>
</div>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
